name: Actualizar Menu Estatico SEO
on:
  repository_dispatch:
    types: [sheet_updated]
  workflow_dispatch:

# Solución: Cancela automáticamente las ejecuciones viejas si haces cambios rápidos seguidos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-menu:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requerido para resolver sincronizaciones de git correctamente

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar HTML Estatico
        run: python generate_menu.py

      - name: Commitear y subir cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add menu-estatico.html
          
          # Verifica si hay cambios reales antes de intentar operar
          if ! git diff --quiet --staged; then
            git commit -m "SEO: Menu estatico actualizado por cambio en Sheet"
            git pull --rebase origin main # Sincroniza el repositorio en tiempo real si otro bot se adelantó
            git push
          else
            echo "Sin cambios detectados en el HTML."
          fi
