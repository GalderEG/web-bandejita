name: Actualizar Menu Estatico SEO
on:
  repository_dispatch:
    types: [sheet_updated]
  workflow_dispatch:

jobs:
  build-menu:
    runs-on: ubuntu-latest
    # Corrección: Otorga permisos explícitos para hacer push al repositorio
    permissions:
      contents: write
      
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar HTML Estatico
        run: python generate_menu.py

      - name: Commitear y subir cambios
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add menu-estatico.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "SEO: Menu estatico actualizado por cambio en Sheet" && git push)
