<script>
        // CONFIGURACIÓN
        const TELEFONO = "584120767007"; 
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSfR6ILf3cDq51hVw-GBANJ1wpfH5NrKgBgPvaYMAUeSiWLpWUCsCPJIkA5m-Ok1E7NpPtJtLzfAURH/pub?gid=0&single=true&output=csv"; 
        
        let timerInterval = null;

        document.addEventListener("DOMContentLoaded", () => {
            const headerEl = document.getElementById('main-header');
            const navEl = document.getElementById('sticky-nav');
            window.addEventListener('scroll', () => {
                const triggerPoint = headerEl.offsetHeight - 50; 
                if (window.scrollY > triggerPoint) navEl.classList.add('scrolled-mode');
                else navEl.classList.remove('scrolled-mode');
            });
        });

        // CAMBIO DE PESTAÑAS
        function switchTab(tabName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            let btnIndex = 0;
            if(tabName === 'menu') btnIndex = 1;
            if(tabName === 'blog') btnIndex = 2;
            document.querySelectorAll('.tab-btn')[btnIndex].classList.add('active');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const handleText = document.getElementById('social-handle');
            const groupBandejita = document.getElementById('social-bandejita');
            const groupAngel = document.getElementById('social-angel');

            if (tabName === 'blog') {
                handleText.innerText = "@angelchaconcocinero";
                groupBandejita.classList.remove('active');
                groupAngel.classList.add('active');
            } else {
                handleText.innerText = "@bandejitadelata";
                groupAngel.classList.remove('active');
                groupBandejita.classList.add('active');
            }
        }
        
        function irAHorarios() {
            switchTab('inicio');
            setTimeout(() => {
                const el = document.getElementById('anchor-horarios');
                if(el) el.scrollIntoView({ behavior: 'smooth' });
            }, 300);
        }

        function sharePage() {
            if (navigator.share) {
                navigator.share({
                    title: 'Aguamiel Con Leche',
                    text: 'Nuestro menú y precios | Bandejita de Lata',
                    url: 'https://bandejitadelata.com'
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText('https://bandejitadelata.com');
                alert('¡Enlace copiado al portapapeles!');
            }
        }

        function toggleBlogCard(card) {
            const wrapper = card.querySelector('.blog-text-wrapper');
            const btn = card.querySelector('.read-more-btn');
            
            if (wrapper.classList.contains('collapsed')) {
                wrapper.classList.remove('collapsed');
                wrapper.classList.add('expanded');
                btn.innerHTML = 'Leer menos <i class="fa-solid fa-chevron-up"></i>';
            } else {
                wrapper.classList.remove('expanded');
                wrapper.classList.add('collapsed');
                btn.innerHTML = 'Leer historia completa <i class="fa-solid fa-chevron-down"></i>';
                
                setTimeout(() => {
                    const navHeight = document.getElementById('sticky-nav').offsetHeight;
                    const cardPosition = card.getBoundingClientRect().top + window.scrollY;
                    const offset = cardPosition - navHeight - 20; 
                    window.scrollTo({ top: offset, behavior: 'smooth' });
                }, 100);
            }
        }

        function toggleNews(header) {
            const wrapper = header.parentElement;
            const body = wrapper.querySelector('.news-body');
            const icon = header.querySelector('.arrow');

            if (body.classList.contains('open')) {
                body.classList.remove('open');
                icon.classList.remove('fa-chevron-up');
                icon.classList.add('fa-chevron-down');
            } else {
                body.classList.add('open');
                icon.classList.remove('fa-chevron-down');
                icon.classList.add('fa-chevron-up');
            }
        }

        const params = new URLSearchParams(window.location.search);
        let origen = params.get('origen') || 'web';
        document.getElementById('whatsapp-btn').href = `https://wa.me/${TELEFONO}?text=${encodeURIComponent("Hola Ángel, vengo de " + origen + " y quisiera hacer un pedido.")}`;

        function parseCSV(text) {
            let filas = []; let filaActual = []; let celda = ""; let enComillas = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i]; let nextChar = text[i+1];
                if (char === '"') { 
                    if (enComillas && nextChar === '"') { celda += '"'; i++; } else { enComillas = !enComillas; } 
                } else if (char === ',' && !enComillas) { filaActual.push(celda); celda = ""; } 
                else if (char === '\n' && !enComillas) { filaActual.push(celda); filas.push(filaActual); filaActual = []; celda = ""; } 
                else if (char !== '\r') { celda += char; }
            }
            if (celda || filaActual.length > 0) { filaActual.push(celda); filas.push(filaActual); }
            return filas;
        }

        // --- NUEVA LÓGICA DE TIEMPO VENEZUELA ---
        function getVenezuelaDate() {
            // Crea un objeto Date ajustado a la zona horaria de Caracas
            // Hack para obtener la fecha correcta independientemente del cliente
            const d = new Date();
            const vzlaTime = d.toLocaleString("en-US", {timeZone: "America/Caracas"});
            return new Date(vzlaTime);
        }

        function checkEstadoTienda(filasHorario) {
            const diasSemana = ['Domingo', 'Lunes', 'Martes', 'Miercoles', 'Jueves', 'Viernes', 'Sabado'];
            
            // USAMOS LA HORA DE VENEZUELA, NO LA DEL DISPOSITIVO
            const hoy = getVenezuelaDate();
            
            const diaHoyIndex = hoy.getDay(); 
            const diaHoyNombre = diasSemana[diaHoyIndex];
            
            let estado = 'CERRADO';
            let fechaApertura = null;
            let esDiaLaborable = false; 

            for (let i = 0; i < filasHorario.length; i++) {
                const fila = filasHorario[i];
                const rangoDias = fila[0].trim();
                const rangoHoras = fila[1].trim();

                if (rangoHoras.toUpperCase().includes('CERRADO') || rangoHoras.toUpperCase().includes('DESCANSO')) continue;

                let esDiaCorrecto = false;
                if (rangoDias.toLowerCase().includes(' a ') || rangoDias.includes('-')) {
                    const partes = rangoDias.split(/-| a /).map(d => d.trim());
                    if(partes.length === 2) {
                        const inicioIdx = diasSemana.findIndex(d => d.toLowerCase().startsWith(partes[0].toLowerCase().slice(0,3)));
                        const finIdx = diasSemana.findIndex(d => d.toLowerCase().startsWith(partes[1].toLowerCase().slice(0,3)));
                        if (inicioIdx !== -1 && finIdx !== -1) {
                            if (inicioIdx <= finIdx) { if (diaHoyIndex >= inicioIdx && diaHoyIndex <= finIdx) esDiaCorrecto = true; } 
                            else { if (diaHoyIndex >= inicioIdx || diaHoyIndex <= finIdx) esDiaCorrecto = true; }
                        }
                    }
                } else if (rangoDias.includes(',')) {
                    const lista = rangoDias.split(',').map(d => d.trim().toLowerCase());
                    if (lista.some(d => diaHoyNombre.toLowerCase().startsWith(d.slice(0,3)))) esDiaCorrecto = true;
                } else {
                    if (rangoDias.toLowerCase().startsWith(diaHoyNombre.toLowerCase().slice(0,3))) esDiaCorrecto = true;
                }

                if (!esDiaCorrecto) continue;
                esDiaLaborable = true; 

                const partesHora = rangoHoras.split('-');
                if (partesHora.length > 1) {
                    const horaInicioRaw = partesHora[0].trim();
                    const horaFinRaw = partesHora[1].trim();     
                    
                    const parseTime = (timeStr) => {
                        const m = timeStr.match(/(\d{1,2}):(\d{2})\s*(AM|PM|am|pm)/i);
                        if (!m) return null;
                        let h = parseInt(m[1]);
                        let min = parseInt(m[2]);
                        let ap = m[3].toUpperCase();
                        if (ap === 'PM' && h < 12) h += 12;
                        if (ap === 'AM' && h === 12) h = 0;
                        
                        // Creamos la fecha base usando la hora de Vzla obtenida arriba
                        const d = getVenezuelaDate();
                        d.setHours(h, min, 0, 0);
                        return d;
                    };

                    const inicio = parseTime(horaInicioRaw);
                    const fin = parseTime(horaFinRaw);

                    if (inicio && fin) {
                        // Ajuste si el turno termina al día siguiente (ej: cierra a las 01:00 AM)
                        if (fin < inicio) {
                            fin.setDate(fin.getDate() + 1);
                        }

                        fechaApertura = inicio;
                        const preOrdenTime = new Date(inicio);
                        preOrdenTime.setHours(inicio.getHours() - 3);

                        if (hoy >= inicio && hoy < fin) {
                            estado = 'ABIERTO';
                            break;
                        } else if (hoy >= preOrdenTime && hoy < inicio) {
                            estado = 'PRE_ORDEN';
                            break;
                        }
                    }
                }
            }
            
            if (estado === 'CERRADO' && !esDiaLaborable) {
                estado = 'DIA_NO_LABORABLE';
            }

            return { estado, fechaApertura };
        }

        function startCountdown(targetDate) {
            if(timerInterval) clearInterval(timerInterval);

            const update = () => {
                const display = document.getElementById('countdown');
                if(!display) return; 

                // Comparar contra hora Vzla
                const now = getVenezuelaDate().getTime();
                const distance = targetDate.getTime() - now;

                if (distance < 0) {
                    clearInterval(timerInterval);
                    location.reload(); 
                    return;
                }

                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                display.innerHTML = 
                    (hours < 10 ? "0" + hours : hours) + ":" + 
                    (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                    (seconds < 10 ? "0" + seconds : seconds);
            };

            update();
            timerInterval = setInterval(update, 1000);
        }

        async function cargarTodo() {
            try {
                // SOLO CARGAMOS EL EXCEL (Ya no hay API externa)
                const sheetResponse = await fetch(SHEET_CSV_URL);
                const csvData = await sheetResponse.text();
                
                const filas = parseCSV(csvData);
                
                // --- LÓGICA DE TASA MANUAL ---
                // Leemos la celda I2 (Fila index 1, Columna index 8)
                let tasaBCV = 0;
                try {
                    // Verificamos que exista la fila y la columna
                    if (filas.length > 1 && filas[1].length > 8) {
                        let valorCelda = filas[1][8]; // Columna I
                        if(valorCelda) {
                            // Reemplazamos coma por punto por si acaso y parseamos
                            tasaBCV = parseFloat(valorCelda.replace(',', '.').trim());
                        }
                    }
                } catch (e) {
                    console.error("Error leyendo tasa manual:", e);
                }

                // Si no se encuentra tasa, ponemos 1 o lanzamos alerta (opcional)
                if (!tasaBCV || isNaN(tasaBCV)) {
                    console.warn("No se encontró tasa en I2, usando 1 por defecto");
                    tasaBCV = 1; 
                }
                // -----------------------------

                let modoMoneda = 'bs'; 
                if (filas.length > 1 && filas[1].length > 6) {
                    const celdaG2 = filas[1][6];
                    if (celdaG2) {
                        const configSheet = celdaG2.trim().toLowerCase();
                        if (configSheet === 'usd') modoMoneda = 'usd';
                        if (configSheet === 'bs') modoMoneda = 'bs';
                    }
                }
                
                const statusMsg = document.getElementById('status-msg');
                const mensajesCarga = ["Afilando cuchillos...", "Probando la salsa...", "Horneando ideas...", "Sirviendo la mesa..."];
                statusMsg.textContent = mensajesCarga[Math.floor(Math.random() * mensajesCarga.length)];

                const menuContainer = document.getElementById('menu-content');
                const hoursContainer = document.getElementById('hours-content');
                const reviewsContainer = document.getElementById('reviews-container');
                const reviewsBox = document.getElementById('reviews-box');
                const blogContainer = document.getElementById('blog-content'); 
                
                let htmlAcumuladoMenu = ''; // Optimización de renderizado

                const menuPorCategoria = {}; const ordenCategorias = []; 
                let hayNoticias = false; let hayReviews = false; let hayBlog = false;
                let filasHorarios = [];
                let htmlNoticias = ''; 

                filas.forEach((fila, index) => {
                    if (index === 0) return; 
                    
                    const nombre = fila[0] ? fila[0].trim() : '';
                    const desc = fila[1] ? fila[1].trim() : '';
                    const precioRaw = fila[2] ? fila[2].trim() : '0'; 
                    const categoria = fila[3] ? fila[3].trim() : 'Otros';
                    const disponible = fila[4] ? fila[4].toLowerCase().trim() : '';
                    const destacado = fila[5] ? fila[5].toLowerCase().trim() : '';
                    const cantidadRaw = fila[7] ? fila[7].trim() : ''; 
                    const cantidad = parseInt(cantidadRaw);

                    if (nombre) {
                        if (categoria.toLowerCase() === 'noticias' && disponible === 'si') {
                            hayNoticias = true;
                            htmlNoticias += `
                                <div class="news-accordion">
                                    <div class="news-header" onclick="toggleNews(this)">
                                        <span><i class="fa-solid fa-bullhorn" style="margin-right:8px;"></i> ${nombre}</span>
                                        <i class="fa-solid fa-chevron-down arrow"></i>
                                    </div>
                                    <div class="news-body">
                                        <div class="news-content">${desc}</div>
                                    </div>
                                </div>
                            `;
                            return;
                        }
                        if (categoria.toLowerCase() === 'horarios' && disponible === 'si') {
                            hoursContainer.innerHTML += `<div class="hours-item"><span style="font-weight:600; color:var(--blue);">${nombre}</span><span style="font-size:0.9rem;">${desc}</span></div>`;
                            filasHorarios.push([nombre, desc]); 
                            return;
                        }
                        if (categoria.toLowerCase() === 'testimonios' && disponible === 'si') {
                            hayReviews = true;
                            reviewsContainer.innerHTML += `<div class="review-card"><div class="review-header"><div class="review-author">${nombre}</div><div class="review-stars">${fila[2]}</div></div><p class="review-text">"${desc}"</p></div>`;
                            return;
                        }
                        if (categoria.toLowerCase() === 'blog' && disponible === 'si') {
                            if (!hayBlog) { blogContainer.innerHTML = ''; hayBlog = true; }
                            blogContainer.innerHTML += `<div class="blog-card" onclick="toggleBlogCard(this)"><span class="blog-date">${fila[2]}</span><h3 class="blog-title">${nombre}</h3><div class="blog-text-wrapper collapsed"><div class="blog-content">${desc}</div></div><button class="read-more-btn">Leer historia completa <i class="fa-solid fa-chevron-down"></i></button></div>`;
                            return;
                        }

                        if (disponible === 'si') {
                            let precioFinal = "0.00"; let simbolo = "";
                            let limpio = precioRaw.replace('$', '').replace(',', '.');
                            const precioUSD = parseFloat(limpio);

                            if(!isNaN(precioUSD)) {
                                if (modoMoneda === 'usd') {
                                    precioFinal = precioUSD.toFixed(2);
                                    if (precioFinal.endsWith('.00')) precioFinal = precioFinal.slice(0, -3);
                                    simbolo = "$";
                                } else {
                                    const precioCalculado = (precioUSD * tasaBCV); 
                                    precioFinal = precioCalculado.toFixed(2);
                                    simbolo = "Bs ";
                                }
                            }

                            let stockHTML = '';
                            if (!isNaN(cantidad) && cantidad > 0) {
                                const isLowStock = cantidad <= 5;
                                const stockClass = isLowStock ? 'stock-alert' : 'stock-normal';
                                const text = isLowStock ? `¡Solo quedan ${cantidad}!` : `Disponibles: ${cantidad}`;
                                stockHTML = `<div class="stock-label ${stockClass}">${text}</div>`;
                            }

                            if (!menuPorCategoria[categoria]) { menuPorCategoria[categoria] = []; ordenCategorias.push(categoria); }
                            menuPorCategoria[categoria].push({ nombre, desc, precio: precioFinal, simbolo: simbolo, destacado: destacado === 'si', stockHTML });
                        }
                    }
                });

                const datosTienda = checkEstadoTienda(filasHorarios);
                const estado = datosTienda.estado; 

                // LIMPIAMOS MENU
                menuContainer.innerHTML = '';

                if (estado === 'CERRADO' || estado === 'DIA_NO_LABORABLE') {
                    
                    let tituloCierre = "Fogones Apagados por Hoy";
                    let mensajeCierre = "Nuestro servicio ha finalizado. Estamos preparando los ingredientes más frescos para mañana. ¡Te esperamos!";
                    
                    if (estado === 'DIA_NO_LABORABLE') {
                        tituloCierre = "Hoy Descansamos";
                        mensajeCierre = "Hoy los fogones descansan para recargar energías y volver con más sabor. ¡Nos vemos en nuestro próximo día de servicio!";
                    }

                    htmlAcumuladoMenu += htmlNoticias;
                    
                    htmlAcumuladoMenu += `
                        <div class="closed-state">
                            <i class="fa-solid fa-fire-burner closed-icon"></i>
                            <h2 class="closed-title">${tituloCierre}</h2>
                            <p class="closed-text">${mensajeCierre}</p>
                            <button onclick="irAHorarios()" class="closed-btn">Ver Horarios</button>
                        </div>
                    `;

                    // VITRINA DE POSTRES
                    if (menuPorCategoria['Postres']) {
                        htmlAcumuladoMenu += `
                            <div style="text-align:center; margin: 40px 0 20px 0;">
                                <h3 style="color:var(--blue); font-size:1.2rem; margin-bottom:5px;"> 🍰Nuestros postres siguen disponibles🧁 </h3>
                                <p style="font-size:0.9rem; color:#666;">Aunque la cocina cerró, nuestra vitrina de postres sigue activa:</p>
                            </div>
                        `;
                        
                        const postres = menuPorCategoria['Postres'];
                        postres.forEach((plato, i) => {
                            htmlAcumuladoMenu += `
                                <div class="card ${plato.destacado ? 'destacado' : ''}" style="opacity:1;">
                                    ${plato.destacado ? '<div class="badge-rec"><i class="fa-solid fa-star"></i> Recomendado</div>' : ''}
                                    <div class="info">
                                        <div class="dish-name">${plato.nombre}</div>
                                        <p class="dish-desc">${plato.desc}</p>
                                    </div>
                                    <div class="price-container">
                                        <div class="price-pill">${plato.simbolo}${plato.precio}</div>
                                        ${plato.stockHTML}
                                    </div>
                                </div>`;
                        });
                    }

                } else {
                    let bannerHTML = '';
                    
                    if (estado === 'PRE_ORDEN' && datosTienda.fechaApertura) {
                        const horaStr = datosTienda.fechaApertura.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});
                        bannerHTML = `
                            <div class="pre-order-banner">
                                <span class="pre-order-title"><i class="fa-solid fa-stopwatch" style="margin-right:5px;"></i> Calentando Fogones</span>
                                <span class="countdown-timer" id="countdown">00:00:00</span>
                                <p class="pre-order-msg">Puedes ir apartando tu pedido. Empezamos a cocinar a las ${horaStr}</p>
                            </div>
                        `;
                    }

                    htmlAcumuladoMenu += htmlNoticias;
                    htmlAcumuladoMenu += bannerHTML;

                    if (ordenCategorias.length === 0) {
                        htmlAcumuladoMenu += '<div style="text-align:center; padding:40px;"><p>No hay platos disponibles en este momento.</p></div>';
                    } else {
                        ordenCategorias.forEach(cat => {
                            const platos = menuPorCategoria[cat];
                            platos.sort((a, b) => {
                                if (a.destacado && !b.destacado) return -1;
                                if (!a.destacado && b.destacado) return 1;
                                return a.nombre.localeCompare(b.nombre);
                            });
                            htmlAcumuladoMenu += `<h2 class="category-title">${cat}</h2>`;
                            platos.forEach((plato, i) => {
                                const delay = Math.min(i * 0.05, 0.5);
                                htmlAcumuladoMenu += `
                                    <div class="card ${plato.destacado ? 'destacado' : ''}" style="animation: fadeUp 0.5s ease-out forwards; animation-delay: ${delay}s; opacity:0;">
                                        ${plato.destacado ? '<div class="badge-rec"><i class="fa-solid fa-star"></i> Recomendado</div>' : ''}
                                        <div class="info">
                                            <div class="dish-name">${plato.nombre}</div>
                                            <p class="dish-desc">${plato.desc}</p>
                                        </div>
                                        <div class="price-container">
                                            <div class="price-pill">${plato.simbolo}${plato.precio}</div>
                                            ${plato.stockHTML}
                                        </div>
                                    </div>`;
                            });
                        });
                    }

                    if (estado === 'PRE_ORDEN' && datosTienda.fechaApertura) {
                        startCountdown(datosTienda.fechaApertura);
                    }
                }

                menuContainer.innerHTML = htmlAcumuladoMenu;

                if(hayReviews) reviewsBox.style.display = 'block';
                if(hoursContainer.innerHTML === '') hoursContainer.innerHTML = '<p>Consultar WhatsApp</p>';

            } catch (error) { 
                console.error(error); 
                document.getElementById('menu-content').innerHTML = `
                    <div style="text-align:center; padding:40px;">
                        <p>Ups, hubo un problema cargando el menú.</p>
                        <button onclick="location.reload()" style="padding:10px 20px; background:var(--blue); color:white; border:none; border-radius:5px;">Reintentar</button>
                    </div>`;
            }
        }
        
        cargarTodo();
    </script>
